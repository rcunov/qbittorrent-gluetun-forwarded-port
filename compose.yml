---
services:
  gluetun:
    # Control server auth required as of v3.40.0
    # https://github.com/qdm12/gluetun-wiki/blob/v3.40.2/setup/advanced/control-server.md#control-server
    image: qmcgaw/gluetun:latest
    cap_add:
      - NET_ADMIN
    environment:
      - "VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}"
      - "OPENVPN_USER=${OPENVPN_USER}"
      - "OPENVPN_PASSWORD=${OPENVPN_PASSWORD}"
      - "SERVER_REGIONS=${SERVER_REGIONS}"
      - VPN_PORT_FORWARDING=on
    volumes:
      - ./volumes/gluetun/tmp:/tmp/gluetun
      - ./volumes/gluetun/auth:/gluetun/auth
    ports:
      - "8080:8080"
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    network_mode: "service:gluetun"
    environment:
      - WEBUI_PORT=8080 # If you change this port, be sure to update the qbHostname variable accordingly
      - UMASK=022
    volumes:
      - ./volumes/qbit:/config
  gluetun-qbit-port:
    image: ghcr.io/rcunov/qbittorrent-gluetun-forwarded-port:latest
    # build: # For local build
    #   context: .
    network_mode: "service:gluetun"
    depends_on:
      - qbittorrent
    init: true
    restart: on-failure
    user: 1000:1000 # You can set to run as any user. If you're having issues, might need to run as root
    environment:
      - "TZ=${TZ}" # Use your machine's current time zone for the container's logs
      - "qbitHostname=http://localhost:8080" # If you aren't running this container behind Gluetun, set this to however the container should access qBit
      - "gluetunHostname=http://localhost:8000" # Same thing for Gluetun - don't change these if you are using {{ network_mode: "service:gluetun" }}
      - "qbitApiKey=${qbitApiKey}" # Settings -> WebUI -> Generate API key
      - "gluetunApiKey=${gluetunApiKey}" # docker run --rm qmcgaw/gluetun genkey
      - "logLevel=DEBUG" # Possible values are ERROR, INFO, and DEBUG
